<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Hacker - Inspector Tool</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --container-bg: #111827;
            --accent-blue: #0ea5e9;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-red: #ef4444;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: var(--accent-blue); text-shadow: 0 0 10px rgba(14, 165, 233, 0.5); margin: 5px 0; }
        .warning-box { border: 1px solid var(--accent-red); background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 5px; max-width: 500px; font-size: 0.8rem; color: #fca5a5; text-align: center; margin-bottom: 30px; }
        .search-container { background: var(--container-bg); border: 1px solid #1f2937; padding: 20px; border-radius: 8px; width: 100%; max-width: 500px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; background: #1f2937; border: 1px solid #374151; padding: 12px; border-radius: 5px; color: white; font-family: inherit; }
        .btn { background: var(--accent-blue); color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .button-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .tool-btn { background: #1f2937; color: var(--accent-blue); border: 1px solid var(--accent-blue); padding: 12px; border-radius: 5px; cursor: pointer; font-family: inherit; font-weight: bold; text-align: center; }
        .tool-btn:hover { background: var(--accent-blue); color: white; }
        .output-container { margin-top: 25px; width: 100%; max-width: 500px; background: #05070c; border: 1px solid #1f2937; border-radius: 8px; padding: 15px; display: none; }
        .output-header { color: var(--accent-blue); border-bottom: 1px solid #1f2937; padding-bottom: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; font-size: 0.85rem; color: #34d399; max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="header">
        <h1>👑 CUTE HACKER 👑</h1>
        <h2>CODE INSPECTOR TOOL</h2>
        <p style="color: var(--text-muted)">Developer: 💎 CUTE HACKER 💎</p>
    </div>

    <div class="warning-box">
        ⚠️ WARNING: This tool is only for Educational purposes please don't use wrong.
    </div>

    <div class="search-container">
        <div class="input-group">
            <input type="text" id="targetUrl" placeholder="Enter target link (e.g., example.com)">
            <button class="btn" onclick="scanWebsite()">SCAN</button>
        </div>

        <div class="button-grid">
            <button class="tool-btn" onclick="displaySection('html')">VIEW HTML CODE</button>
            <button class="tool-btn" onclick="displaySection('full')">VIEW FULL CODE</button>
            <button class="tool-btn" onclick="displaySection('apis')">VIEW EXTRACTED APIS</button>
            <button class="tool-btn" onclick="displaySection('passwords')">VIEW PASSWORDS</button>
            <button class="tool-btn" onclick="displaySection('whois')">WHOIS SCANNER</button>
            <button class="tool-btn" onclick="displaySection('nmap')">NMAP PORT SCANNER</button>
        </div>
    </div>

    <div class="output-container" id="outputBox">
        <div class="output-header">
            <span id="outputTitle">CONSOLE OUTPUT</span>
            <span style="color: var(--text-muted); cursor: pointer;" onclick="document.getElementById('outputBox').style.display='none'">[X]</span>
        </div>
        <pre id="outputText">No data available. Please scan a URL first.</pre>
    </div>

    <script>
        let scannedData = null;

        async function scanWebsite() {
            const url = document.getElementById('targetUrl').value;
            if (!url) return alert('Please enter a website link!');

            document.getElementById('outputBox').style.display = 'block';
            document.getElementById('outputText').innerText = "[+] Initializing CUTE HACKER Secure Code Inspector Engine...\n[+] Processing Serverless API Analysis, please wait...";

            try {
                const response = await fetch('/api/inspect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();
                if (data.success) {
                    scannedData = data;
                    document.getElementById('outputText').innerText = "[+] Analysis Completed successfully! Click the buttons above to view details.";
                } else {
                    document.getElementById('outputText').innerText = `[-] Error: ${data.error}`;
                }
            } catch (err) {
                document.getElementById('outputText').innerText = `[-] Failed to fetch response from Serverless Endpoint.`;
            }
        }

        function displaySection(type) {
            if (!scannedData) return alert('Please scan a website first!');
            
            document.getElementById('outputBox').style.display = 'block';
            const output = document.getElementById('outputText');

            if (type === 'html' || type === 'full') {
                document.getElementById('outputTitle').innerText = "REAL HTML SOURCE CODE";
                output.innerText = scannedData.html;
            } else if (type === 'apis') {
                document.getElementById('outputTitle').innerText = "EXTRACTED API ENDPOINTS";
                output.innerText = JSON.stringify(scannedData.apis, null, 2);
            } else if (type === 'passwords') {
                document.getElementById('outputTitle').innerText = "PASSWORDS & CONFIG KEYS";
                output.innerText = scannedData.diagnostics.credentialAudit;
            } else if (type === 'whois') {
                document.getElementById('outputTitle').innerText = "WHOIS DOMAIN LOOKUP";
                output.innerText = `[Target]: ${scannedData.diagnostics.targetHost}\n[Timestamp]: ${scannedData.diagnostics.scanTime}\n\n=== Server Response Headers ===\n` + scannedData.diagnostics.serverHeaders.join('\n');
            } else if (type === 'nmap') {
                document.getElementById('outputTitle').innerText = "NMAP NETWORK PORT SCANNER";
                output.innerText = scannedData.diagnostics.portDiagnostics;
            }
        }
    </script>
</body>
</html>
